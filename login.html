<!DOCTYPE html>
<html lang="pt-br">
<head>
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script crossorigin src="https://unpkg.com/react@17/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
    <link rel="stylesheet" href="style.css" type="text/css">

    <script src="https://unpkg.com/@babel/standalone/babel.min.js">
        class Login extends react.component{
            constructor(props){
                super(props);

                const list = props.list ? props.list:[];

                this.state ={id: 0, name: "", email: "", password: "", list}

                this.handleNameChange = this.handleNameChange.bind(this);
                this.handleEmailChange =  this.handleEmailChange.bind(this);
                this.handlePasswordChange =  this.handlePasswordChange.bind(this);
                this.handleSubmit = this.handleSubmit.bind(this);
            }

            handleNameChange(event){
                this.setState({name: event.target.value});
            }

            handleEmailChange(event){
                this.setState({email: event.target.value});
            }

            handlePasswordChange(event){
                this.setState({password: event.target.value});
            }

            handleSubmit(event){
                const list = this.state.list;
                list.push({
                    id: this.state.list.length + 1,
                    name: this.state.name,
                    email: this.state.email,
                    password: this.state.password
                });

                this.setState({
                    id: 0,
                    name: "",
                    email: "",
                    password: "",
                    list: list
                })

                event.preventDefault();
            }

            render(){
                let itemList = this.state.list.map((it) => 
            <li key={it.email}>
               <b>{it.name}</b>
               <b>{it.id}</b>
            </li>
            )
            return(
                <form onSubmit={this.handleSubmit}>
                    <label htmlFor="ttl">Login</label>
                    <br/>
                    <br/>
                    <label htmlFor="ttl">Nome de Usúario</label>
                    <input name="login" type="text" value={this.state.name + " #" + this.state.id}size="30"
                      onChenge={this.handleNameChange}/>
                    <br/>
                    <label htmlFor="ttl">Email</label>
                    <input name="login" type="text" value={this.state.email} size="30"
                      onChenge={this.handleEmailChange}/>
                    <br/>
                    <label htmlFor="ttl">Senha</label>
                    <input name="login" type="text" value={this.state.password} size="30"
                      onChenge={this.handlePasswordChange}/>
                    <br/>
                    <br/>
                    <button type="submit" value="submit">Salvar</button>
                    <ul>
                        {itemList}
                    </ul>
                </form>
            );
            }
        }
        function App(){
            return (<Login/>)
        }

        reactDOM.render(
            <App/>,
            document.getElementById("oi")
        )
    </script>
</head>
<body>
   <div id="oi">

   </div>
</body>
</html>
